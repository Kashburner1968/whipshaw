name: Automated Market Decoupling Tracker

on:
  schedule:
    # Runs Monday through Friday at 21:15 UTC (4:15 PM EST)
    - cron: '15 21 * * 1-5'
  workflow_dispatch: # Allows manual verification testing

jobs:
  update-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc curl git

      - name: Setup Python Runtime
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.10'
          cache: 'pip'

      - name: Install Python Package Dependencies
        run: |
          pip install pandas matplotlib requests

      - name: Execute Shell Data Extraction Engine
        run: |
          chmod +x track_correction.sh
          ./track_correction.sh

      - name: Execute Python Visualization & Graph Generator
        run: |
          python generate_chart.py

      - name: Commit and Push Structural Updates to Remote Main
        run: |
          git config --global user.name "Market-Liquidity-Bot"
          git config --global user.email "bot@github.automation.internal"
          
          # Stage tracking logs, json frameworks, and generated chart assets
          git add liquidity_drain_log.md decoupling_trend.png market_analysis.json
          
          # Avoid workflow failure if market was closed/no data changed
          if git diff-index --quiet HEAD --; then
            echo "No structural market divergence detected. Skipping update."
          else
            git commit -m "data-update: [systemic-outflow-metrics] $(date '+%Y-%m-%d') execution"
            git push origin main
          fi
