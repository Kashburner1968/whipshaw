name: Automated Headline Learning Loop Firewall

on:
  schedule:
    # Runs at a scheduled interval
    - cron: '0 * * * *' 

jobs:
  run-all-cloud-modules:
    runs-on: ubuntu-latest
    
    # Resolves warning by forcing Node 24 compatibility environment variable
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      # Upgraded from v4 to v6 to eliminate Node 20 deprecations
      - name: Checkout Repository
        uses: actions/checkout@v6

      # Upgraded from v5 to v6 to eliminate Node 20 deprecations
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # Automatically installs any specified requirements if a manifest exists
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Executes your actual Python script from the repository
      - name: Run Cloud Modules
        run: |
          echo "Executing modules..."
