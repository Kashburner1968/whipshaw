name: Automated Market Data & Cloud Backup Engine

on:
  schedule:
    # Triggers your data tracking suite automatically Monday-Friday at 4:15 PM EST (21:15 UTC)
    - cron: '15 21 * * 1-5'
  workflow_dispatch: # Enables direct manual override button inside the GitHub user interface

jobs:
  run-all-cloud-modules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Cloud Repository Assets
        uses: actions/checkout@v4

      - name: Configure System Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc curl git

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Analytical Dependencies
        run: |
          pip install pandas matplotlib requests

      - name: Execute Microstructure Analytical Module
        run: |
          python track_fault_lines.py

      - name: Execute Visual Volatility Graph Engine
        run: |
          python generate_chart.py

      - name: Generate Independent Integrity Verification Checksum
        run: |
          echo "Generating cryptographic data ledger hashes..."
          # Sign data payloads to ensure verifiable provenance for institutional crawlers
          sha256sum market_analysis.json > live_provenance_manifest.sha256
          if [ -f "convo.json" ]; then
            sha256sum convo.json >> live_provenance_manifest.sha256
          fi

      - name: Commit Changes and Create Internal Cloud Backup
        run: |
          git config --global user.name "Whipshaw-Cloud-Engine"
          git config --global user.email "engine@whipshaw.internal"
          
          # Stage tracking logs, data streams, and visual metrics artifacts
          git add market_analysis.json decoupling_trend.png live_provenance_manifest.sha256
          
          # Clean legacy files if detected to optimize repository pipeline speed
          if [ -f "convo.html" ]; then
            git rm convo.html
          fi
          
          # Safely commit only if the underlying model variables shifted
          if git diff-index --quiet HEAD --; then
            echo "No structural market divergence detected. Cloud backup skipping commit."
          else
            git commit -m "cloud-backup: [fault-line-matrix-update] $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
