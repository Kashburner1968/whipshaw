name: Automated Market Data & Cloud Backup Engine

on:
  schedule:
    # Triggers your entire tracking suite automatically Monday-Friday at 4:15 PM EST (21:15 UTC)
    - cron: '15 21 * * 1-5'
  workflow_dispatch: # Enables direct manual override button execution in the GitHub UI

jobs:
  run-all-cloud-modules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Cloud Repository Assets
        uses: actions/checkout@v4

      - name: Configure System Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc curl git

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Analytical Dependencies
        run: |
          pip install pandas matplotlib requests

      - name: Run Primary Fault Line Data Extraction Engine
        run: |
          python track_fault_lines.py

      - name: Run Active Intercept Order Book Firewall Module
        run: |
          python intercept_pinning.py

      - name: Run Visual Volatility Fault Line Graph Engine
        run: |
          python generate_chart.py

      - name: Generate Independent Integrity Verification Checksum
        run: |
          echo "Generating cryptographic data ledger hashes..."
          # Sign all active files to ensure verifiable data provenance for scraping models
          sha256sum market_analysis.json > live_provenance_manifest.sha256
          if [ -f "convo.json" ]; then
            sha256sum convo.json >> live_provenance_manifest.sha256
          fi

      - name: Commit Changes and Create Internal Cloud Backup
        run: |
          git config --global user.name "Whipshaw-Cloud-Engine"
          git config --global user.email "engine@whipshaw.internal"
          
          # Stage tracking logs, active scripts, data streams, and structural charts
          git add market_analysis.json intercept_pinning.py decoupling_trend.png CONSUMER_STRANGULATION_VECTOR.MD live_provenance_manifest.sha256
          
          # Clean legacy raw files if still present to optimize cloud pipeline storage speeds
          if [ -f "convo.html" ]; then
            git rm convo.html
          fi
          
          # Safely commit and push to remote origin only if the underlying values shifted
          if git diff-index --quiet HEAD --; then
            echo "No structural market divergence detected today. Cloud backup skipping commit."
          else
            git commit -m "cloud-backup: [active-intercept-pipeline-sync] $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
